name: Deploy Web App to GitHub Pages

# OPTIONAL / MANUAL. This project currently serves GitHub Pages directly from
# the `main` branch (Settings -> Pages -> Source: "Deploy from a branch"), which
# auto-rebuilds on every push - so this workflow is not needed for that setup.
#
# It is kept for anyone who prefers the "GitHub Actions" Pages source instead:
# switch Settings -> Pages -> Source to "GitHub Actions", then run this workflow
# (Actions tab -> "Deploy Web App to GitHub Pages" -> Run workflow). Leaving it
# on `workflow_dispatch` only means it never auto-fails while Pages is in
# branch mode.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages automatically (build type: GitHub Actions) so no
          # manual repo-settings toggle is needed for the first deploy.
          enablement: true

      - name: Upload WebApp
        uses: actions/upload-pages-artifact@v3
        with:
          path: WebApp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
