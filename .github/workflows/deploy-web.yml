name: Deploy Web App to GitHub Pages

# Publishes the in-browser solver (WebApp/) to GitHub Pages so anyone can play
# it on any device from a single link. No secrets or Unity license required.
#
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source:
# "GitHub Actions". After that this runs automatically on every push to main.

on:
  push:
    branches: [ main ]
    paths:
      - 'WebApp/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages automatically (build type: GitHub Actions) so no
          # manual repo-settings toggle is needed for the first deploy.
          enablement: true

      - name: Upload WebApp
        uses: actions/upload-pages-artifact@v3
        with:
          path: WebApp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
